# Credential access detection rules
# MITRE ATT&CK: T1003, T1552, T1110

rules:
  - id: credential_shadow_read
    name: Unusual /etc/shadow read
    description: A non-standard process read /etc/shadow, which contains password hashes.
    severity: high
    mitre_tactic: Credential Access
    mitre_technique: T1003.008
    condition:
      event_type: file.read
      file_path: "/etc/shadow"
      # Exclude: passwd, chpasswd, useradd, login, sshd, sudo, su, pam
    action: alert
    enabled: true
    tags: [credential-access, shadow-file]

  - id: credential_ssh_key_access
    name: SSH private key accessed by unusual process
    description: A non-SSH process accessed an SSH private key file.
    severity: medium
    mitre_tactic: Credential Access
    mitre_technique: T1552.004
    condition:
      event_type: file.read
      file_path: ".*/.ssh/id_(rsa|ed25519|ecdsa|dsa)$"
      # Exclude: ssh, sshd, ssh-agent, git
    action: alert
    enabled: true
    tags: [credential-access, ssh-keys]

  - id: credential_aws_access
    name: AWS credentials file accessed by unusual process
    description: A non-standard process accessed AWS credential files.
    severity: medium
    mitre_tactic: Credential Access
    mitre_technique: T1552.001
    condition:
      event_type: file.read
      file_path: ".*/.aws/(credentials|config)$"
    action: alert
    enabled: true
    tags: [credential-access, cloud-credentials]
